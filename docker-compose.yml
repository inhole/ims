services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ims
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      TZ: Asia/Seoul
    volumes:
      - ims-postgres-data:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ims-postgres-data:
